<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>OGQ Pet</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 100vw; height: 100vh; background: transparent; overflow: hidden;
      cursor: default; font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-app-region: no-drag;
    }

    /* ===== 펫 ===== */
    #pet-container {
      position: fixed; width: 120px; height: 120px; z-index: 9999;
      pointer-events: auto; cursor: pointer;
    }
    #pet-img {
      width: 100%; height: 100%; background: transparent;
      transition: transform 0.3s ease, filter 0.3s ease;
      -webkit-user-drag: none;
    }
    #pet-container:hover #pet-img { filter: drop-shadow(0 0 8px rgba(78,205,196,0.6)); }

    /* ===== 말풍선 ===== */
    #speech-bubble {
      position: absolute; bottom: 110%; left: 50%; transform: translateX(-50%);
      background: white; border-radius: 16px; padding: 8px 14px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15); font-size: 13px; font-weight: 600;
      color: #333; white-space: nowrap; opacity: 0; pointer-events: none;
      transition: opacity 0.3s, transform 0.3s; z-index: 10002;
    }
    #speech-bubble.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }
    #speech-bubble::after {
      content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
      border: 8px solid transparent; border-top-color: white;
    }

    /* ===== 상태 표시 (우측 상단 고정) ===== */
    #status-panel {
      position: fixed; top: 24px; right: 24px; pointer-events: auto;
      z-index: 10000; display: flex; flex-direction: column; align-items: flex-end; gap: 8px;
    }
    #status-card {
      background: rgba(255,250,240,0.85); border-radius: 12px; padding: 10px 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      border: 1px solid rgba(255,255,255,0.5); cursor: pointer;
      transition: box-shadow 0.2s;
      display: flex; flex-direction: column; gap: 6px;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    }
    #status-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.12); }
    #status-row {
      display: flex; align-items: center; gap: 8px;
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      animation: dotPulse 2s ease-in-out infinite;
    }
    .status-dot.working { background: #34c759; }
    .status-dot.resting { background: #aaa; }
    @keyframes dotPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    #status-label { font-size: 12px; font-weight: 500; color: #333; }
    #time-display { font-size: 12px; font-weight: 600; color: #333; margin-left: auto; font-variant-numeric: tabular-nums; }
    #today-summary {
      font-size: 11px; color: #555; font-weight: 500;
      border-top: 1px solid #f0f0f0; padding-top: 6px;
    }

    /* ===== 타이머 ===== */
    #timer-wrap {
      pointer-events: auto; cursor: pointer; display: none;
      flex-direction: column; align-items: center; gap: 4px;
    }
    #timer-wrap.show { display: flex; }
    #timer-circle {
      width: 80px; height: 80px; border-radius: 50%;
      background: conic-gradient(#4ecdc4 0deg 360deg, #eee 360deg);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.12); position: relative;
      transition: background 1s ease, box-shadow 0.2s;
    }
    #timer-circle:hover { box-shadow: 0 4px 20px rgba(78,205,196,0.4); }
    #timer-circle.paused { opacity: 0.6; }
    #timer-inner {
      background: white; width: 60px; height: 60px; border-radius: 50%;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 1px;
    }
    #timer-min { font-size: 18px; font-weight: 700; color: #4ecdc4; line-height: 1; }
    #timer-sec { font-size: 12px; font-weight: 600; color: #666; line-height: 1; }
    #timer-mode { font-size: 9px; color: #999; line-height: 1; margin-top: 1px; }

    /* 타이머 설정 패널 */
    #timer-settings {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: white; border-radius: 16px; padding: 24px 28px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.3); z-index: 20000;
      pointer-events: auto; display: none; text-align: center;
    }
    #timer-settings.show { display: block; }
    #timer-settings h3 { font-size: 16px; color: #333; margin-bottom: 12px; }
    .timer-inputs { display: flex; gap: 8px; align-items: center; justify-content: center; margin-bottom: 14px; }
    .timer-inputs input {
      width: 54px; height: 40px; border: 2px solid #e0e0e0; border-radius: 10px;
      text-align: center; font-size: 18px; font-weight: 600; color: #333; outline: none;
      pointer-events: auto;
    }
    .timer-inputs input:focus { border-color: #10C58E; }
    .timer-inputs input::-webkit-inner-spin-button,
    .timer-inputs input::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    .timer-inputs span { font-size: 13px; color: #999; }
    .timer-btns { display: flex; gap: 8px; justify-content: center; }
    .timer-btns button { padding: 8px 20px; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .btn-apply { background: #10C58E; color: white; }
    .btn-cancel { background: #f0f0f0; color: #666; }

    /* ===== 통계 패널 ===== */
    #stats-panel {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: white; border-radius: 20px; padding: 28px 32px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.25); z-index: 20000;
      pointer-events: auto; display: none; min-width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }
    #stats-panel.show { display: block; }
    #stats-panel h2 { font-size: 18px; color: #333; margin-bottom: 16px; text-align: center; }
    .stats-today { display: flex; gap: 16px; margin-bottom: 20px; justify-content: center; }
    .stat-card {
      flex: 1; text-align: center; padding: 12px; border-radius: 14px; max-width: 140px;
    }
    .stat-card.work { background: #e8faf6; }
    .stat-card.rest { background: #fff0f5; }
    .stat-label { font-size: 11px; color: #999; margin-bottom: 4px; }
    .stat-value { font-size: 22px; font-weight: 700; }
    .stat-card.work .stat-value { color: #4ecdc4; }
    .stat-card.rest .stat-value { color: #ff6b9d; }
    .stat-unit { font-size: 12px; color: #999; }

    /* 주간 그래프 */
    .weekly-chart { margin-top: 8px; }
    .weekly-chart h3 { font-size: 13px; color: #999; margin-bottom: 10px; text-align: center; }
    .chart-bars { display: flex; gap: 6px; align-items: flex-end; height: 80px; justify-content: center; }
    .chart-day { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; max-width: 36px; }
    .chart-bar-wrap { width: 20px; height: 70px; display: flex; flex-direction: column; justify-content: flex-end; gap: 1px; }
    .chart-bar { border-radius: 3px; min-height: 2px; transition: height 0.5s ease; }
    .chart-bar.work { background: #4ecdc4; }
    .chart-bar.rest { background: #ff6b9d; }
    .chart-label { font-size: 10px; color: #aaa; }
    .chart-label.today { color: #4ecdc4; font-weight: 700; }

    .stats-close {
      display: block; margin: 16px auto 0; padding: 8px 24px; border: none;
      border-radius: 10px; background: #f0f0f0; color: #666;
      font-size: 14px; font-weight: 600; cursor: pointer;
    }
    .stats-close:hover { background: #e0e0e0; }

    /* ===== 메모 패널 ===== */
    #memo-panel {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: #fff; border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.22); z-index: 20000;
      pointer-events: auto; display: none; width: 420px; height: 400px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      flex-direction: row; overflow: hidden;
    }
    #memo-panel.show { display: flex; }

    /* 사이드바 */
    #memo-sidebar {
      width: 130px; background: #f8f8fa; display: flex; flex-direction: column;
      border-right: 1px solid #eee; flex-shrink: 0;
    }
    #memo-sidebar-top {
      padding: 12px 10px 8px; display: flex; justify-content: space-between; align-items: center;
    }
    #memo-sidebar-top span { font-size: 13px; font-weight: 700; color: #333; }
    #btn-new-memo {
      border: none; background: #10C58E; color: white;
      font-size: 11px; font-weight: 600; cursor: pointer; border-radius: 6px;
      padding: 4px 10px;
    }
    #btn-new-memo:hover { background: #0db07d; }
    #memo-list {
      flex: 1; overflow-y: auto; padding: 2px 0;
    }
    #memo-list::-webkit-scrollbar { width: 2px; }
    #memo-list::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }
    .memo-list-item {
      padding: 10px; cursor: pointer; transition: background 0.15s;
      border-bottom: 1px solid #f0f0f0;
    }
    .memo-list-item:hover { background: #eeeff1; }
    .memo-list-item.active { background: #e3e4e8; }
    .memo-list-title {
      font-size: 12px; font-weight: 600; color: #333;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .memo-list-preview {
      font-size: 10px; color: #999; margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* 에디터 */
    #memo-editor {
      flex: 1; display: flex; flex-direction: column;
    }
    #memo-toolbar {
      padding: 8px 12px; display: flex; justify-content: flex-end; align-items: center;
      gap: 4px; border-bottom: 1px solid #f0f0f0;
    }
    .memo-icon-btn {
      border: none; font-size: 12px; font-weight: 600; cursor: pointer;
      border-radius: 6px; padding: 4px 10px;
    }
    .memo-icon-btn.del { background: #fff0f0; color: #ff6b6b; }
    .memo-icon-btn.del:hover { background: #ffe0e0; }
    .memo-icon-btn.close { background: #f0f0f0; color: #666; }
    .memo-icon-btn.close:hover { background: #e0e0e0; }
    #memo-textarea {
      flex: 1; border: none; outline: none; padding: 14px 16px;
      font-size: 14px; line-height: 1.8; color: #333; resize: none;
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      pointer-events: auto; -webkit-user-select: text; user-select: text;
    }
    #memo-textarea::placeholder { color: #ccc; }
    #memo-empty-msg {
      flex: 1; display: flex; align-items: center; justify-content: center;
      color: #ccc; font-size: 13px;
    }

    /* ===== 기타 이펙트 ===== */
    .heart-particle {
      position: fixed; font-size: 18px; pointer-events: none; z-index: 10001;
      animation: heartFloat 1s ease-out forwards;
    }
    @keyframes heartFloat {
      0% { opacity: 1; transform: translateY(0) scale(0.5); }
      50% { opacity: 0.8; transform: translateY(-30px) scale(1.2); }
      100% { opacity: 0; transform: translateY(-60px) scale(0.8); }
    }

    .drag-sparkle {
      position: fixed; font-size: 14px; pointer-events: none; z-index: 10001;
      animation: sparklePop 0.5s ease-out forwards;
    }
    @keyframes sparklePop {
      0% { opacity: 1; transform: scale(0.5) rotate(0deg); }
      100% { opacity: 0; transform: scale(1.5) rotate(180deg) translateY(-20px); }
    }

    #loading {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-size: 24px; color: #4ecdc4; z-index: 10000;
    }
  </style>
</head>
<body>
  <div id="loading">로딩 중...</div>

  <div id="pet-container" style="display: none;">
    <div id="speech-bubble"></div>
    <img id="pet-img" src="" alt="펫">
  </div>

  <div id="status-panel" style="display: none;">
    <div id="status-card">
      <div id="status-row">
        <div class="status-dot working" id="status-dot"></div>
        <span id="status-label">대기 중</span>
        <span id="time-display">0:00</span>
      </div>
      <div id="today-summary">오늘 업무 0분 | 휴식 0분</div>
    </div>
    <div id="timer-wrap">
      <div id="timer-circle">
        <div id="timer-inner">
          <div id="timer-min">0</div>
          <div id="timer-sec">00</div>
          <div id="timer-mode">집중</div>
        </div>
      </div>
    </div>
  </div>

  <div id="timer-settings">
    <h3>집중 시간</h3>
    <div class="timer-inputs">
      <input type="number" id="set-min" min="0" max="99" value="0"><span>분</span>
      <input type="number" id="set-sec" min="0" max="59" value="0"><span>초</span>
    </div>
    <h3>휴식 시간</h3>
    <div class="timer-inputs">
      <input type="number" id="set-rest-min" min="0" max="99" value="0"><span>분</span>
      <input type="number" id="set-rest-sec" min="0" max="59" value="0"><span>초</span>
    </div>
    <div class="timer-btns">
      <button class="btn-apply" id="btn-apply-timer">시작</button>
      <button class="btn-cancel" id="btn-cancel-timer">취소</button>
    </div>
  </div>

  <div id="memo-panel">
    <div id="memo-sidebar">
      <div id="memo-sidebar-top">
        <span>메모</span>
        <button id="btn-new-memo">새 메모</button>
      </div>
      <div id="memo-list"></div>
    </div>
    <div id="memo-editor">
      <div id="memo-toolbar">
        <button class="memo-icon-btn del" id="btn-del-memo">삭제</button>
        <button class="memo-icon-btn close" id="btn-close-memo">닫기</button>
      </div>
      <textarea id="memo-textarea" placeholder="여기에 자유롭게 메모하세요..."></textarea>
      <div id="memo-empty-msg" style="display:none;">새 메모 버튼으로 메모를 만드세요</div>
    </div>
  </div>

  <div id="stats-panel">
    <h2>활동 리포트</h2>
    <div class="stats-today">
      <div class="stat-card work">
        <div class="stat-label">업무</div>
        <div class="stat-value" id="stat-work">0</div>
        <div class="stat-unit">분</div>
      </div>
      <div class="stat-card rest">
        <div class="stat-label">휴식</div>
        <div class="stat-value" id="stat-rest">0</div>
        <div class="stat-unit">분</div>
      </div>
    </div>
    <div class="weekly-chart">
      <h3>이번 주</h3>
      <div class="chart-bars" id="weekly-bars"></div>
    </div>
    <button class="stats-close" id="btn-close-stats">닫기</button>
  </div>

  <script>
    const petContainer = document.getElementById('pet-container');
    const petImg = document.getElementById('pet-img');
    const loadingEl = document.getElementById('loading');
    const speechBubble = document.getElementById('speech-bubble');
    const statusPanel = document.getElementById('status-panel');
    const statusDot = document.getElementById('status-dot');
    const timeDisplay = document.getElementById('time-display');
    const statusLabel = document.getElementById('status-label');
    const todaySummary = document.getElementById('today-summary');
    const statsPanel = document.getElementById('stats-panel');

    // ===== 펫 물리 =====
    let currentX = 0, currentY = 0, targetX = 0, targetY = 0;
    let isDragging = false, dragOffsetX = 0, dragOffsetY = 0;
    let petFolder = '';
    let currentGifNum = 1;
    let currentState = 'idle';

    // GIF 매핑: 상태별 GIF 번호
    const GIF_MAP = {
      idle: [1, 8, 10, 14, 18],
      working: [5, 9, 12, 13, 17],
      resting: [3, 6, 7, 11, 15],
      alert_work: [20, 22],
      alert_rest: [2, 4]
    };

    // GIF 순환: 상태별 5개 GIF를 순서대로 돌림
    let gifCycleIndex = 0;
    let gifCycleTimer = null;
    const GIF_CYCLE_INTERVAL = 3000; // 3초마다 변경

    function startGifCycle() {
      if (gifCycleTimer) clearInterval(gifCycleTimer);
      gifCycleIndex = 0;
      applyGifForCurrentState();
      gifCycleTimer = setInterval(() => {
        const nums = GIF_MAP[currentState] || GIF_MAP.idle;
        gifCycleIndex = (gifCycleIndex + 1) % nums.length;
        const gif = `${petFolder}/${nums[gifCycleIndex]}.gif`;
        petImg.src = gif + '?t=' + Date.now();
      }, GIF_CYCLE_INTERVAL);
    }

    function applyGifForCurrentState() {
      const nums = GIF_MAP[currentState] || GIF_MAP.idle;
      gifCycleIndex = 0;
      const gif = `${petFolder}/${nums[0]}.gif`;
      petImg.src = gif + '?t=' + Date.now();
    }

    function changeCharacterGif(state) {
      if (state === currentState) return;
      currentState = state;
      startGifCycle();
    }

    // ===== 말풍선 =====
    let speechTimeout = null;
    function showSpeech(text, duration = 4000) {
      speechBubble.textContent = text;
      speechBubble.classList.add('show');
      if (speechTimeout) clearTimeout(speechTimeout);
      speechTimeout = setTimeout(() => speechBubble.classList.remove('show'), duration);
    }

    // ===== 시간 포맷 =====
    function formatTime(sec) {
      const h = Math.floor(sec / 3600);
      const m = Math.floor((sec % 3600) / 60);
      const s = sec % 60;
      if (h > 0) return `${h}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
      return `${m}:${s.toString().padStart(2,'0')}`;
    }
    function formatMin(sec) {
      const h = Math.floor(sec / 3600);
      const m = Math.floor((sec % 3600) / 60);
      if (h > 0) return `${h}시간 ${m}분`;
      return `${m}분`;
    }

    // ===== 활동 상태 수신 =====
    let lastState = 'idle';
    window.api.onActivityState((data) => {
      const { state, workSec, restSec, continuousWorkSec, continuousRestSec } = data;

      // 상태 뱃지 업데이트
      statusPanel.style.display = 'flex';
      statusDot.className = `status-dot ${state}`;
      const badge = document.getElementById('status-card');
      badge.classList.toggle('resting', state === 'resting');

      if (state === 'working') {
        timeDisplay.textContent = formatTime(continuousWorkSec);
        statusLabel.textContent = '업무 중';
      } else {
        timeDisplay.textContent = formatTime(continuousRestSec);
        statusLabel.textContent = '휴식 중';
      }

      todaySummary.textContent = `오늘 업무 ${formatMin(workSec)} | 휴식 ${formatMin(restSec)}`;

      // 상태 전환 시 GIF 변경
      if (state !== lastState) {
        changeCharacterGif(state);
        if (state === 'working' && lastState === 'resting') {
          showSpeech('다시 일하자!', 3000);
        } else if (state === 'resting' && lastState === 'working') {
          showSpeech('잠시 쉬는 중...', 3000);
        }
        lastState = state;
      }
    });

    // ===== 알림 수신 =====
    window.api.onActivityAlert((type) => {
      if (type === 'work-long') {
        changeCharacterGif('alert_work');
        showSpeech('50분 넘게 일했어! 좀 쉬어!', 6000);
        playChime();
      } else if (type === 'rest-long') {
        changeCharacterGif('alert_rest');
        showSpeech('슬슬 다시 시작할까?', 6000);
        playChime();
      }
    });

    // ===== 알림 사운드 =====
    function playChime() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        [523.25, 659.25, 783.99].forEach((freq, i) => {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sine'; osc.frequency.value = freq;
          gain.gain.setValueAtTime(0.15, ctx.currentTime + i * 0.15);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.15 + 0.5);
          osc.connect(gain); gain.connect(ctx.destination);
          osc.start(ctx.currentTime + i * 0.15);
          osc.stop(ctx.currentTime + i * 0.15 + 0.5);
        });
      } catch (e) {}
    }

    // ===== 펫 데이터 수신 =====
    window.api.onPetData((petData) => {
      petFolder = petData.folder || '';
      document.title = `${petData.name} 펫 활성화됨`;

      // 초기 위치
      let sx = petData.startX || window.innerWidth / 2;
      let sy = petData.startY || window.innerHeight / 2;
      if (sx < 60 || sx > window.innerWidth - 60) sx = window.innerWidth / 2;
      if (sy < 60 || sy > window.innerHeight - 60) sy = window.innerHeight / 2;
      currentX = sx; currentY = sy; targetX = sx; targetY = sy;
      petContainer.style.left = (currentX - 60) + 'px';
      petContainer.style.top = (currentY - 60) + 'px';

      // 기본 GIF 로드
      const defaultGif = petFolder ? `${petFolder}/1.gif` : petData.gif;
      petImg.onload = () => {
        loadingEl.style.display = 'none';
        petContainer.style.display = 'block';
        petImg.onload = null; // 이후 GIF 변경 시 재호출 방지
        startGifCycle();
      };
      petImg.onerror = () => {
        // 폴더 GIF 실패 시 기본 GIF로 시도
        petImg.onerror = () => {
          loadingEl.textContent = 'GIF 로드 실패';
          setTimeout(() => window.api.backToSelect(), 2000);
        };
        petImg.src = petData.gif;
      };
      petImg.src = defaultGif;
    });

    // ===== 타이머 =====
    const timerWrap = document.getElementById('timer-wrap');
    const timerCircle = document.getElementById('timer-circle');
    const timerMinEl = document.getElementById('timer-min');
    const timerSecEl = document.getElementById('timer-sec');
    const timerModeEl = document.getElementById('timer-mode');
    const timerSettings = document.getElementById('timer-settings');

    let tmrFocus = 0, tmrRest = 0;
    let tmrTime = 0, tmrRunning = false, tmrRestMode = false;

    function updateTimerDisplay() {
      const m = Math.floor(tmrTime / 60);
      const s = tmrTime % 60;
      timerMinEl.textContent = m;
      timerSecEl.textContent = s.toString().padStart(2, '0');
      timerModeEl.textContent = tmrRunning ? (tmrRestMode ? '휴식' : '집중') : '일시정지';
      const total = tmrRestMode ? tmrRest : tmrFocus;
      const elapsed = total - tmrTime;
      const deg = total > 0 ? (elapsed / total) * 360 : 0;
      const c1 = tmrRestMode ? '#ff6b9d' : '#4ecdc4';
      timerCircle.style.background = `conic-gradient(${c1} 0deg ${deg}deg, #eee ${deg}deg 360deg)`;
      timerCircle.classList.toggle('paused', !tmrRunning);
    }

    setInterval(() => {
      if (!tmrRunning || tmrTime <= 0) return;
      tmrTime--;
      updateTimerDisplay();
      if (tmrTime <= 0) {
        playChime();
        if (!tmrRestMode) {
          tmrRestMode = true; tmrTime = tmrRest;
          showSpeech('집중 끝! 쉬자!', 4000);
        } else {
          tmrRestMode = false; tmrTime = tmrFocus;
          showSpeech('휴식 끝! 다시 집중!', 4000);
        }
        updateTimerDisplay();
      }
    }, 1000);

    // 타이머 클릭 → 일시정지/재개
    timerCircle.addEventListener('click', () => {
      if (tmrTime > 0) {
        tmrRunning = !tmrRunning;
        updateTimerDisplay();
      }
    });

    timerWrap.addEventListener('mouseenter', () => window.api.setIgnoreMouseEvents(false));
    timerWrap.addEventListener('mouseleave', () => window.api.setIgnoreMouseEvents(true, { forward: true }));

    function showTimerSettings() {
      document.getElementById('set-min').value = Math.floor(tmrFocus / 60);
      document.getElementById('set-sec').value = tmrFocus % 60;
      document.getElementById('set-rest-min').value = Math.floor(tmrRest / 60);
      document.getElementById('set-rest-sec').value = tmrRest % 60;
      timerSettings.classList.add('show');
      window.api.setIgnoreMouseEvents(false);
    }
    function hideTimerSettings() {
      timerSettings.classList.remove('show');
      window.api.setIgnoreMouseEvents(true, { forward: true });
    }

    timerSettings.addEventListener('mouseenter', () => window.api.setIgnoreMouseEvents(false));

    document.getElementById('btn-apply-timer').addEventListener('click', () => {
      const total = (parseInt(document.getElementById('set-min').value)||0)*60 + (parseInt(document.getElementById('set-sec').value)||0);
      const restTotal = (parseInt(document.getElementById('set-rest-min').value)||0)*60 + (parseInt(document.getElementById('set-rest-sec').value)||0);
      if (total <= 0) return;
      tmrFocus = total; tmrRest = restTotal > 0 ? restTotal : 0;
      tmrTime = tmrFocus; tmrRunning = false; tmrRestMode = false;
      timerWrap.style.display = 'flex';
      updateTimerDisplay(); hideTimerSettings();
      showSpeech('타이머 설정 완료! 시작하려면 메뉴에서 타이머 시작', 3000);
    });
    document.getElementById('btn-cancel-timer').addEventListener('click', hideTimerSettings);

    // ===== 컨텍스트 메뉴 액션 =====
    window.api.onContextMenuAction(async (action) => {
      if (action === 'show-memo') {
        showMemo(); return;
      } else if (action === 'timer-start') {
        if (tmrFocus <= 0) { showTimerSettings(); return; }
        tmrRunning = true;
        timerWrap.style.display = 'flex';
        updateTimerDisplay();
        showSpeech('타이머 시작!', 2000);
      } else if (action === 'timer-stop') {
        tmrRunning = false;
        updateTimerDisplay();
        showSpeech('타이머 멈춤', 2000);
      } else if (action === 'show-timer-settings') {
        showTimerSettings();
      } else if (action === 'show-stats') {
        const stats = await window.api.getStats();
        document.getElementById('stat-work').textContent = Math.round(stats.today.workSec / 60);
        document.getElementById('stat-rest').textContent = Math.round(stats.today.restSec / 60);

        // 주간 그래프
        const barsEl = document.getElementById('weekly-bars');
        barsEl.innerHTML = '';
        const maxSec = Math.max(...stats.weekly.map(d => d.workSec + d.restSec), 1);
        stats.weekly.forEach((d, i) => {
          const day = document.createElement('div');
          day.className = 'chart-day';
          const barWrap = document.createElement('div');
          barWrap.className = 'chart-bar-wrap';
          const workBar = document.createElement('div');
          workBar.className = 'chart-bar work';
          workBar.style.height = Math.max((d.workSec / maxSec) * 60, 2) + 'px';
          const restBar = document.createElement('div');
          restBar.className = 'chart-bar rest';
          restBar.style.height = Math.max((d.restSec / maxSec) * 60, 2) + 'px';
          barWrap.appendChild(restBar);
          barWrap.appendChild(workBar);
          const label = document.createElement('div');
          label.className = 'chart-label' + (i === 6 ? ' today' : '');
          label.textContent = d.day;
          day.appendChild(barWrap);
          day.appendChild(label);
          barsEl.appendChild(day);
        });

        statsPanel.classList.add('show');
        window.api.setIgnoreMouseEvents(false);
      }
    });

    statsPanel.addEventListener('mouseenter', () => window.api.setIgnoreMouseEvents(false));
    document.getElementById('btn-close-stats').addEventListener('click', () => {
      statsPanel.classList.remove('show');
      window.api.setIgnoreMouseEvents(true, { forward: true });
    });

    // ===== 하트 파티클 =====
    function spawnHearts(x, y) {
      const hearts = ['❤️', '💕', '💖', '🩷'];
      for (let i = 0; i < 4; i++) {
        const el = document.createElement('div');
        el.className = 'heart-particle';
        el.textContent = hearts[i];
        el.style.left = (x + (Math.random() - 0.5) * 40) + 'px';
        el.style.top = (y - 10) + 'px';
        el.style.animationDelay = (i * 0.1) + 's';
        document.body.appendChild(el);
        el.addEventListener('animationend', () => el.remove());
      }
    }

    // ===== 드래그 스파클 =====
    let dragSparkleCounter = 0;
    function spawnDragSparkle(x, y) {
      const sparkles = ['✨', '⭐', '💫', '🌟'];
      const el = document.createElement('div');
      el.className = 'drag-sparkle';
      el.textContent = sparkles[Math.floor(Math.random() * sparkles.length)];
      el.style.left = (x + (Math.random() - 0.5) * 30) + 'px';
      el.style.top = (y + (Math.random() - 0.5) * 30) + 'px';
      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }

    // ===== 애니메이션 루프 =====
    function animate() {
      petContainer.style.left = (currentX - 60) + 'px';
      petContainer.style.top = (currentY - 60) + 'px';
      requestAnimationFrame(animate);
    }
    animate();

    // ===== 펫 드래그 =====
    petContainer.addEventListener('mouseenter', () => window.api.setIgnoreMouseEvents(false));
    petContainer.addEventListener('mouseleave', () => { if (!isDragging) window.api.setIgnoreMouseEvents(true, { forward: true }); });

    petContainer.addEventListener('mousedown', (e) => {
      if (e.button !== 0) return;
      isDragging = true;
      dragOffsetX = e.clientX - currentX; dragOffsetY = e.clientY - currentY;
      petImg.style.cursor = 'grabbing'; petImg.style.transform = 'scale(1.1)';
      window.api.setIgnoreMouseEvents(false); // 드래그 중 전체 마우스 캡처
    });

    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      currentX = e.clientX - dragOffsetX; currentY = e.clientY - dragOffsetY;
      targetX = currentX; targetY = currentY;
      petContainer.style.left = (currentX - 60) + 'px';
      petContainer.style.top = (currentY - 60) + 'px';
      dragSparkleCounter++;
      if (dragSparkleCounter % 3 === 0) spawnDragSparkle(e.clientX, e.clientY);
    });

    document.addEventListener('mouseup', () => {
      if (!isDragging) return;
      isDragging = false;
      petImg.style.cursor = 'pointer'; petImg.style.transform = '';
      window.api.setIgnoreMouseEvents(true, { forward: true }); // 드래그 끝나면 다시 투과
    });

    petContainer.addEventListener('click', () => { if (!isDragging) spawnHearts(currentX, currentY - 30); });
    petContainer.addEventListener('contextmenu', (e) => { e.preventDefault(); window.api.showContextMenu(); });

    // ===== 상태 패널 마우스 =====
    statusPanel.addEventListener('mouseenter', () => window.api.setIgnoreMouseEvents(false));
    statusPanel.addEventListener('mouseleave', () => window.api.setIgnoreMouseEvents(true, { forward: true }));

    // 상태 뱃지 클릭 → 통계
    document.getElementById('status-card').addEventListener('click', async () => {
      const stats = await window.api.getStats();
      document.getElementById('stat-work').textContent = Math.round(stats.today.workSec / 60);
      document.getElementById('stat-rest').textContent = Math.round(stats.today.restSec / 60);

      const barsEl = document.getElementById('weekly-bars');
      barsEl.innerHTML = '';
      const maxSec = Math.max(...stats.weekly.map(d => d.workSec + d.restSec), 1);
      stats.weekly.forEach((d, i) => {
        const day = document.createElement('div'); day.className = 'chart-day';
        const barWrap = document.createElement('div'); barWrap.className = 'chart-bar-wrap';
        const workBar = document.createElement('div'); workBar.className = 'chart-bar work';
        workBar.style.height = Math.max((d.workSec / maxSec) * 60, 2) + 'px';
        const restBar = document.createElement('div'); restBar.className = 'chart-bar rest';
        restBar.style.height = Math.max((d.restSec / maxSec) * 60, 2) + 'px';
        barWrap.appendChild(restBar); barWrap.appendChild(workBar);
        const label = document.createElement('div');
        label.className = 'chart-label' + (i === 6 ? ' today' : '');
        label.textContent = d.day;
        day.appendChild(barWrap); day.appendChild(label);
        barsEl.appendChild(day);
      });

      statsPanel.classList.add('show');
      window.api.setIgnoreMouseEvents(false);
    });

    // ===== 메모 기능 =====
    const memoPanel = document.getElementById('memo-panel');
    const memoListEl = document.getElementById('memo-list');
    const memoTextarea = document.getElementById('memo-textarea');
    const memoEmptyMsg = document.getElementById('memo-empty-msg');
    let memos = [];
    let activeMemoId = null;
    let memoSaveTimer = null;

    async function loadMemos() {
      const data = await window.api.getMemo();
      if (Array.isArray(data)) memos = data;
      else memos = [];
      renderMemoList();
      if (memos.length > 0) selectMemo(memos[0].id);
      else showMemoEmpty();
    }

    function saveMemos() {
      window.api.saveMemo(memos);
    }

    function renderMemoList() {
      memoListEl.innerHTML = '';
      memos.forEach(m => {
        const div = document.createElement('div');
        div.className = 'memo-list-item' + (m.id === activeMemoId ? ' active' : '');
        const title = document.createElement('div');
        title.className = 'memo-list-title';
        const firstLine = m.text.split('\n')[0].trim();
        title.textContent = firstLine || '새 메모';
        const preview = document.createElement('div');
        preview.className = 'memo-list-preview';
        const lines = m.text.split('\n');
        preview.textContent = lines.length > 1 ? lines[1].trim().slice(0, 30) : '';
        div.appendChild(title);
        div.appendChild(preview);
        div.addEventListener('click', () => selectMemo(m.id));
        memoListEl.appendChild(div);
      });
    }

    function selectMemo(id) {
      activeMemoId = id;
      const memo = memos.find(m => m.id === id);
      if (memo) {
        memoTextarea.value = memo.text;
        memoTextarea.style.display = 'block';
        memoEmptyMsg.style.display = 'none';
      }
      renderMemoList();
    }

    function showMemoEmpty() {
      activeMemoId = null;
      memoTextarea.style.display = 'none';
      memoEmptyMsg.style.display = 'flex';
    }

    function createMemo() {
      const id = Date.now().toString();
      memos.unshift({ id, text: '' });
      saveMemos();
      renderMemoList();
      selectMemo(id);
      memoTextarea.focus();
    }

    function deleteActiveMemo() {
      if (!activeMemoId) return;
      memos = memos.filter(m => m.id !== activeMemoId);
      saveMemos();
      renderMemoList();
      if (memos.length > 0) selectMemo(memos[0].id);
      else showMemoEmpty();
    }

    memoTextarea.addEventListener('input', () => {
      if (!activeMemoId) return;
      const memo = memos.find(m => m.id === activeMemoId);
      if (memo) memo.text = memoTextarea.value;
      renderMemoList();
      if (memoSaveTimer) clearTimeout(memoSaveTimer);
      memoSaveTimer = setTimeout(saveMemos, 300);
    });

    document.getElementById('btn-new-memo').addEventListener('click', createMemo);
    document.getElementById('btn-del-memo').addEventListener('click', deleteActiveMemo);

    function showMemo() {
      loadMemos();
      memoPanel.classList.add('show');
      window.api.setIgnoreMouseEvents(false);
    }
    function hideMemo() {
      saveMemos();
      memoPanel.classList.remove('show');
      window.api.setIgnoreMouseEvents(true, { forward: true });
    }

    memoPanel.addEventListener('mouseenter', () => window.api.setIgnoreMouseEvents(false));
    document.getElementById('btn-close-memo').addEventListener('click', hideMemo);

    // ESC 종료
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') window.api.quitApp(); });
  </script>
</body>
</html>
